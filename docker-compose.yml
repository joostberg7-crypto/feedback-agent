services:
  backend:
    image: suham1/feedback-backend:latest
    ports:
      - "9050:8080"
    env_file:
      - ./backend/.env
    restart: always
    healthcheck:
      # De healthcheck controleert de /api/health route
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    image: suham1/feedback-frontend:latest
    ports:
      - "9051:80"
    restart: always
    depends_on:
      backend:
        condition: service_healthy