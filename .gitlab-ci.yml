stages:
  - auth
  - deploy

gcp-auth:
  stage: auth
  image: google/cloud-sdk:slim
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud:  
        - https://gitlab.fdmci.hva.nl
  tags:
    - hva 
  script:
    - chmod +x ./get_token.sh
    - ./get_token.sh   
    - gcloud config set auth/access_token_file $(pwd)/gcp_temp_token.txt
    - gcloud auth list
    - gcloud config set project "gcp-hva-hbo-ict-prgr-1-481610"
    - gcloud iam service-accounts list

# OEGE deployment job
deploy-to-oege:
  stage: deploy
  image: alpine:latest
  tags:
    - hva
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$OEGE_SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $OEGE_HOST >> ~/.ssh/known_hosts
  script:
    - ssh $OEGE_USER@$OEGE_HOST "
        export PATH=/usr/bin:\$PATH &&
        export DOCKER_HOST=unix:///run/user/$OEGE_UID/docker.sock &&
        cd ~/feedback-agent &&
        git fetch origin &&
        git checkout $CI_COMMIT_REF_NAME &&
        git pull origin $CI_COMMIT_REF_NAME &&
        docker compose up -d --build &&
        docker system prune -f
      "
  only:
    - main
    - development